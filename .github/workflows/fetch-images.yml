name: Fetch images

# Manually triggered. Searches CC-licensed photos for the trip's image slugs,
# optimises them to WebP under public/img, records CREDITS.md, and commits the
# result. Runs where the network is open (GitHub runners), unlike the build
# sandbox. No API key required (Openverse + Wikimedia); set the optional
# UNSPLASH_ACCESS_KEY repo secret for higher-quality photos.
on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-fetch even if a photo already exists'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: fetch-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch:
    name: Fetch + commit images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch images
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/fetch-images.mjs ${{ inputs.force && '--force' || '' }}
      - name: Commit photos
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/img src/data/images.ts
          if git diff --cached --quiet; then
            echo 'No new images to commit.'
          else
            git commit -m 'chore: fetch trip images'
            git push
          fi
