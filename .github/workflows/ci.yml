name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Validate trip data
        run: npm run validate:trip
      - name: Build
        run: npm run build
      - name: Audit (non-blocking)
        run: npm audit --omit=dev || true

  deploy:
    name: Deploy to Cloudflare Pages
    needs: quality
    runs-on: ubuntu-latest
    # Only on the default branch, and only if Cloudflare secrets are configured.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_ACCESS_CODE_HASH: ${{ secrets.VITE_ACCESS_CODE_HASH }}
      - name: Publish
        # Provide CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as repo secrets
        # to enable this step. Without them, deploy is skipped and CI still passes.
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages deploy dist --project-name=viaje
