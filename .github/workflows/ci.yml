name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Deploys are handled by Cloudflare Pages' Git integration: it builds and
# publishes on every push to the production branch (docs/DEPLOYMENT.md, Option A).
# This workflow is purely the quality gate — there is deliberately no deploy job,
# to avoid a second, competing publish path to the same project.
jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Validate trip data
        run: npm run validate:trip
      - name: Build
        run: npm run build
      - name: Audit (non-blocking)
        run: npm audit --omit=dev || true
